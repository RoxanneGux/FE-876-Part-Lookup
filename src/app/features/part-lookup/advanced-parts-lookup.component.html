<div class="advanced-lookup-wrapper">
  <div class="content-container">
    <!-- Title -->
    <div class="sticky-header">
      <h4 class="aw-h-4">Part Search Advanced Lookup</h4>
    </div>

    <!-- Quick Filters Row -->
    <div class="quick-filters-row">
      <aw-search
        [formControl]="searchControl"
        [placeholder]="'Search'"
        [ariaLabel]="'Search parts'">
      </aw-search>

      <aw-select-menu
        [ariaLabel]="'Stock Location'"
        [enableSearch]="true"
        [singleSelectListItems]="stockLocationOptions()"
        [enableListReset]="true"
        [placeholder]="'Filter on Location'"
        [ngModel]="stockLocation()"
        (ngModelChange)="onStockLocationChange($event)">
        <aw-form-field-label>Stock Location</aw-form-field-label>
      </aw-select-menu>

      <aw-select-menu
        [ariaLabel]="'Part filter'"
        [enableSearch]="true"
        [enableListReset]="true"
        [multiSelectListItems]="partFilterOptions()"
        [placeholder]="'Filter on ID or Description'"
        [formControl]="partFilterControl">
        <aw-form-field-label>Part</aw-form-field-label>
      </aw-select-menu>

      <aw-select-menu
        [ariaLabel]="'Product Category'"
        [enableSearch]="true"
        [enableListReset]="true"
        [multiSelectListItems]="categoryFilterOptions()"
        [placeholder]="'Filter on Category'"
        [formControl]="categoryFilterControl">
        <aw-form-field-label>Product Category</aw-form-field-label>
      </aw-select-menu>

      <div class="xref-toggle">
        <aw-toggle
          [ariaLabel]="'Include cross references'"
          [ngModel]="includeXRefs()"
          (ngModelChange)="includeXRefs.set($event)">
        </aw-toggle>
        <span class="aw-b-1">Include XRefs</span>
      </div>

      <button AwButtonIconOnly [buttonType]="'primary'"
        [active]="activeFilterChips().length > 0"
        (click)="openAdvancedFilter()"
        ariaLabel="Open filters" type="button">
        <aw-icon [iconName]="'filter_list'" [iconColor]="''"></aw-icon>
      </button>
    </div>

    <!-- Filter Chips from Side Drawer -->
    @if (activeFilterChips().length > 0) {
      <div class="filter-chips-row d-flex flex-wrap gap-3 ps-3 pt-2 pe-3 pb-4 mb-2">
        @for (chip of activeFilterChips(); track chip) {
          <aw-chip
            [label]="chip"
            [variant]="'outline'"
            [id]="chip"
            [showRemoveButton]="true"
            (removed)="removeFilterChip(chip)">
          </aw-chip>
        }
      </div>
    }

    <!-- Table -->
    <div class="table-container">
      <aw-table
        [attr.aria-label]="'Parts search results'"
        [columnsDefinition]="columnsDefinition()"
        [tableData]="tableData()"
        [enableSingleSelection]="mode() === 'single'"
        [tableOptions]="tableOptions"
        (rowSelected)="onRowSelected($event)"
        (checkboxList)="onCheckboxListChange($event)">
      </aw-table>
    </div>
  </div>

  <!-- Footer -->
  <div class="aw-sticky-footer">
    <aw-action-bar [actionsLeft]="footerActionsLeft" [actionsRight]="footerActionsRight"></aw-action-bar>
  </div>
</div>

<!-- Side Drawer Filter Panel — always in DOM, opened programmatically -->
<aw-side-drawer
  [attr.aria-label]="'Filter panel'"
  [drawerInformation]="filterDrawerInfo()"
  [openFromRight]="true"
  #sideDrawerFilter>
  <div class="filter-panel">
    <aw-select-menu
      [ariaLabel]="'Equipment Type'"
      [enableSearch]="true"
      [enableListReset]="true"
      [multiSelectListItems]="equipmentTypeOptions()"
      [placeholder]="'Filter on Equipment Type'"
      [formControl]="equipmentTypeControl">
      <aw-form-field-label>Equipment Type</aw-form-field-label>
    </aw-select-menu>

    <aw-select-menu
      [ariaLabel]="'Task Type'"
      [enableSearch]="true"
      [enableListReset]="true"
      [multiSelectListItems]="taskTypeOptions()"
      [placeholder]="'Filter on Task Type'"
      [formControl]="taskTypeControl">
      <aw-form-field-label>Task Type</aw-form-field-label>
    </aw-select-menu>

    <aw-select-menu
      [ariaLabel]="'Class Type'"
      [enableSearch]="true"
      [enableListReset]="true"
      [multiSelectListItems]="classTypeOptions()"
      [placeholder]="'Filter on Class Type'"
      [formControl]="classTypeControl">
      <aw-form-field-label>Class Type</aw-form-field-label>
    </aw-select-menu>
  </div>
</aw-side-drawer>
